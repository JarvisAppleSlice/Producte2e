<!doctype html>
<html lang="en">
	<head>
		<title>Products page</title>
		<script src="index.js" type="module"></script>
	</head>

	<body>
		<h2 id="welcome_message"></h2>

		<div id="receipt"></div>

		<section>
			<button id="register_btn"><a href="registration.html">Register</a></button>
			<button id="login_btn"><a href="login.html">Login</a></button>
			<button id="logout_btn" style="display: none">Logout</button>
		</section>

		<h1>Products:</h1>
		<ul name="products_list"></ul>

		<h2>Create Product:</h2>
		<form name="product_creation">
			<label>Name:</label>
			<input name="name" type="text" />

			<label>Price:</label>
			<input name="price" type="number" step=".01" />

			<label>Inventory:</label>
			<input name="inventoryCount" type="number" />

			<button type="submit">Create Product</button>
		</form>
	</body>
</html>
